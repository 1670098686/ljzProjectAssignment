apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-gateway
  namespace: finance-system
  labels:
    app: finance-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-gateway
  template:
    metadata:
      labels:
        app: finance-gateway
    spec:
      containers:
      - name: gateway
        image: finance/finance-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: SPRING_REDIS_HOST
          value: "redis-service"
        - name: EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE
          value: "http://finance-registry:8761/eureka/"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: finance-gateway
  namespace: finance-system
spec:
  selector:
    app: finance-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
