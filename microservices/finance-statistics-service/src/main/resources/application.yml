server:
  port: 8083
  servlet:
    context-path: /statistics-service

spring:
  application:
    name: finance-statistics-service
  
  # 数据源配置（统计服务独立数据库）
  datasource:
    url: jdbc:mysql://localhost:3306/finance_statistics_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:finance_stats}
    password: ${DB_PASSWORD:finance_stats_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    
  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
    
  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirms: true
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        max-concurrency: 10

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5分钟
      cache-null-values: false
      
  # 消息队列配置
  cloud:
    stream:
      bindings:
        statistics-compute-in:
          destination: finance-exchange
          group: statistics-service-group
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        statistics-update-out:
          destination: finance-exchange
          producer:
            required-groups: notification-service-group

# Eureka配置
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 10
    instance-info-replication-interval-seconds: 10
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    prefer-ip-address: true

# OpenFeign配置
feign:
  compression:
    request:
      enabled: true
      min-request-size: 2048
    response:
      enabled: true
  client:
    config:
      default:
        connect-timeout: 10000
        read-timeout: 30000
        logger-level: basic
  circuitbreaker:
    enabled: true

# Resilience4j熔断器配置
resilience4j:
  circuitbreaker:
    instances:
      transactionService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      transactionService:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakerevents
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s

# 日志配置
logging:
  level:
    com.finance.statistics: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/statistics-service.log
    max-size: 100MB
    max-history: 30

# 统计服务配置
statistics:
  cache:
    ttl:
      summary: 300    # 5分钟
      category: 600   # 10分钟
      trend: 900      # 15分钟
  computation:
    batch-size: 100
    thread-pool-size: 5
    enabled: true
  data-sync:
    enabled: true
    sync-interval: 300000  # 5分钟
    transaction-service-url: ${TRANSACTION_SERVICE_URL:http://localhost:8081}

# 安全配置
security:
  jwt:
    secret: ${JWT_SECRET:finance-stats-secret-key-2023}
    expiration: 86400  # 24小时
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: '*'
    allow-credentials: true

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    filter: true
    tryItOutEnabled: true
  info:
    title: Finance Statistics Service API
    description: 财务管理统计微服务API文档
    version: 1.0.0
    contact:
      name: Finance Team
      email: finance@example.com
    license:
      name: Apache 2.0
      url: https://www.apache.org/licenses/LICENSE-2.0