# Prometheus配置文件
# 个人收支记账APP监控系统

global:
  scrape_interval: 15s  # 全局抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'finance-app'
    environment: 'development'

# 规则文件配置
rule_files:
  - "alert_rules.yml"  # 预警规则
  - "recording_rules.yml"  # 预计算规则

# 监控目标配置
scrape_configs:
  # Spring Boot应用监控
  - job_name: 'finance-app-backend'
    static_configs:
      - targets: ['backend:8080']  # 后端应用
    metrics_path: '/actuator/prometheus'  # 指标路径
    scrape_interval: 10s
    scrape_timeout: 5s
   honor_labels: true

  # 系统指标监控 (Node Exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # 数据库监控 (MySQL Exporter)
  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['mysql-exporter:9104']
    scrape_interval: 30s

  # Redis监控 (Redis Exporter)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # RabbitMQ监控 (RabbitMQ Exporter)
  - job_name: 'rabbitmq-exporter'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']
    scrape_interval: 30s

  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 远程存储配置 (可选)
# remote_write:
