<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>演示账号管理 - 校园跑腿</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/ui-components.css">
    <style>
        .account-card {
            margin-bottom: 16px;
        }
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .account-role {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .role-publisher {
            background-color: #e6f7ff;
            color: #1890ff;
        }
        .role-runner {
            background-color: #f6ffed;
            color: #52c41a;
        }
        .role-admin {
            background-color: #fff7e6;
            color: #faad14;
        }
        .account-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .info-label {
            color: var(--text-secondary);
        }
        .info-value {
            font-weight: 500;
        }
        .generate-btn {
            margin-bottom: 24px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="navbar-left">
                <div class="navbar-back" onclick="history.back()">←</div>
            </div>
            <div class="navbar-title">演示账号管理</div>
            <div class="navbar-right"></div>
        </div>

        <div class="page-content">
            <div class="card mb-16">
                <div class="card-header">
                    <span class="card-title">账号生成</span>
                </div>
                <div class="card-body">
                    <p class="mb-16">生成不同角色的测试账号，用于演示校园跑腿小程序的各种功能。</p>
                    <div class="flex gap-8">
                        <button class="btn btn-primary generate-btn" onclick="generateAccount('publisher')">生成发布者账号</button>
                        <button class="btn btn-success generate-btn" onclick="generateAccount('runner')">生成跑腿员账号</button>
                        <button class="btn btn-warning generate-btn" onclick="generateAccount('admin')">生成管理员账号</button>
                    </div>
                    <button class="btn btn-danger btn-block" onclick="clearAllAccounts()">清空所有测试账号</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">现有测试账号</span>
                    <span class="card-extra">
                        <span id="accountCount">0</span> 个账号
                    </span>
                </div>
                <div class="card-body">
                    <div id="accountsList">
                        <!-- 账号列表将通过JavaScript动态生成 -->
                        <p class="text-center text-secondary">暂无测试账号，点击上方按钮生成</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadAccounts();
        });

        // 加载现有账号并去重，避免历史旧账号混用
        function loadAccounts() {
            const accountsList = document.getElementById('accountsList');
            const accountCount = document.getElementById('accountCount');
            
            let accounts = JSON.parse(localStorage.getItem('demoAccounts') || '[]');
            accounts = dedupeAccounts(accounts);
            // 按创建时间倒序，最近生成的排前
            accounts.sort((a, b) => (b.createTime || 0) - (a.createTime || 0));
            localStorage.setItem('demoAccounts', JSON.stringify(accounts));
            
            accountCount.textContent = accounts.length;
            
            if (accounts.length === 0) {
                accountsList.innerHTML = '<p class="text-center text-secondary">暂无测试账号，点击上方按钮生成</p>';
                return;
            }
            
            let html = '';
            accounts.forEach((account, index) => {
                const safe = JSON.stringify(account).replace(/"/g, '&quot;');
                html += `
                    <div class="account-card card">
                        <div class="account-header">
                            <h3 class="text-lg font-bold">${account.name} (${getRoleName(account.role)})</h3>
                            <span class="account-role role-${account.role}">${getRoleName(account.role)}</span>
                        </div>
                        <div class="account-info">
                            <div>
                                <span class="info-label">ID:</span>
                                <span class="info-value">${account.id}</span>
                            </div>
                            <div>
                                <span class="info-label">手机号:</span>
                                <span class="info-value">${account.phone}</span>
                            </div>
                            <div>
                                <span class="info-label">信用分:</span>
                                <span class="info-value">${account.credit}</span>
                            </div>
                            <div>
                                <span class="info-label">创建时间:</span>
                                <span class="info-value">${new Date(account.createTime).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-primary btn-sm" onclick="loginWithAccount(${safe})">一键登录</button>
                            <button class="btn btn-default btn-sm" onclick="copyAccountInfo(${safe})">复制信息</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteAccount(${index})">删除</button>
                        </div>
                    </div>
                `;
            });
            
            accountsList.innerHTML = html;
        }

        // 去重：同手机号或同ID视为同一账号
        function dedupeAccounts(list) {
            const seen = new Map();
            return (list || []).filter(acc => {
                const key = acc.id || acc.phone;
                if (!key) return false;
                if (seen.has(key)) return false;
                seen.set(key, true);
                return true;
            });
        }

        // 生成账号
        function generateAccount(role) {
            // 生成随机手机号
            const phone = '1' + Math.floor(Math.random() * 9000000000 + 1000000000);
            
            // 生成随机用户名
            const names = ['张三', '李四', '王五', '赵六', '孙七', '周八', '吴九', '郑十'];
            const name = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100);
            
            // 生成账号对象
            const account = {
                id: `demo_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`,
                name: name,
                phone: phone,
                avatar: '',
                credit: Math.floor(Math.random() * 20) + 80, // 80-100之间的信用分
                role: role,
                createTime: Date.now()
            };
            
            // 保存到localStorage
            let accounts = JSON.parse(localStorage.getItem('demoAccounts') || '[]');
            accounts.push(account);
            localStorage.setItem('demoAccounts', JSON.stringify(accounts));
            
            // 更新列表
            loadAccounts();
            
            // 显示成功提示
            CommonUtils.showToast('账号生成成功', 'success');
        }

        // 一键登录
        function loginWithAccount(account) {
            // 独立写入完整身份信息，确保不同账号不会互相覆盖或丢失标识
            const auth = {
                id: account.id,
                name: account.name,
                nickname: account.name,
                phone: account.phone,
                creditScore: account.credit,
                avatar: account.avatar || '',
                role: account.role,
                runnerStatus: account.role === 'runner' ? 'approved' : 'none',
                loggedIn: true,
                firstLogin: false
            };

            // 切换账号前清理与前一账号相关的任务/缓存，防止数据串用
            try {
                const clearKeys = ['tasks','currentTask','currentTaskId','taskMessages','tasksCleared','lastPublishedTaskId','lastPublishedPrice','lastPublishedTitle','messageThreads','evaluations','evaluationStats','runners','appState','currentUser'];
                if (window.dataStore && dataStore.clearTaskCaches) {
                    dataStore.clearTaskCaches();
                } else {
                    clearKeys.forEach(k => localStorage.removeItem(k));
                }
            } catch (e) {
                console.warn('清理旧账号缓存失败', e);
            }

            if (window.CommonUtils && CommonUtils.setAuth) {
                CommonUtils.setAuth(auth);
            } else {
                localStorage.setItem('authUser', JSON.stringify(auth));
            }
            localStorage.setItem('userInfo', JSON.stringify(account));
            localStorage.setItem('isLoggedIn', 'true');

            // 同步到全局 dataStore，方便任务/统计读取
            try {
                if (window.dataStore) {
                    dataStore.set('currentUser', {
                        id: auth.id,
                        name: auth.name,
                        nickname: auth.nickname,
                        phone: auth.phone,
                        role: auth.role,
                        creditScore: auth.creditScore,
                        balance: 0
                    });
                }
            } catch (e) {
                console.warn('写入 dataStore 失败', e);
            }

            // 根据角色确定跳转页面
            let redirectUrl = '首页.html';
            if (account.role === 'admin') {
                redirectUrl = '后台管理.html';
                CommonUtils.showToast('登录成功，正在跳转后台管理页面', 'success');
            } else {
                CommonUtils.showToast('登录成功，正在跳转首页', 'success');
            }
            
            // 延迟跳转
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1200);
        }

        // 复制账号信息
        function copyAccountInfo(account) {
            const accountInfo = `账号信息：
姓名：${account.name}
角色：${getRoleName(account.role)}
手机号：${account.phone}
信用分：${account.credit}
账号ID：${account.id}`;
            
            // 复制到剪贴板
            navigator.clipboard.writeText(accountInfo).then(() => {
                CommonUtils.showToast('账号信息已复制到剪贴板', 'success');
            }).catch(err => {
                CommonUtils.showToast('复制失败，请手动复制', 'error');
            });
        }

        // 删除账号
        function deleteAccount(index) {
            let accounts = JSON.parse(localStorage.getItem('demoAccounts') || '[]');
            accounts.splice(index, 1);
            localStorage.setItem('demoAccounts', JSON.stringify(accounts));
            loadAccounts();
            CommonUtils.showToast('账号已删除', 'success');
        }

        // 清空所有账号
        function clearAllAccounts() {
            if (confirm('确定要清空所有测试账号吗？')) {
                localStorage.removeItem('demoAccounts');
                loadAccounts();
                CommonUtils.showToast('所有账号已清空', 'success');
            }
        }

        // 获取角色名称
        function getRoleName(role) {
            const roleMap = {
                publisher: '发布者',
                runner: '跑腿员',
                admin: '管理员'
            };
            return roleMap[role] || role;
        }
    </script>
</body>
</html>
