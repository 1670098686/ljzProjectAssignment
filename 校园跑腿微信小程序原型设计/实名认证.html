<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>实名认证 - 校园跑腿</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/ui-components.css">
    <style>
        /* 优化页面整体布局 */
        .page-content {
            padding: 16px;
        }
        
        /* 优化标题区域 */
        .auth-title-section {
            margin: 16px 0 24px;
            text-align: center;
            background: #f5f7fa;
            padding: 16px;
            border-radius: 12px;
        }
        
        .auth-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .auth-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        /* 优化表单样式 */
        .card {
            margin-bottom: 24px;
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-input);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        
        /* 优化证件照片上传区域 */
        .upload-area {
            width: 100%;
            height: 180px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            background: var(--bg-input);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(24, 144, 255, 0.05);
        }
        
        .upload-icon {
            font-size: 48px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
        }
        
        .upload-text {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 优化提交按钮 */
        .btn-primary {
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="navbar-left">
                <div class="navbar-back" onclick="history.back()">←</div>
            </div>
            <div class="navbar-title">实名认证</div>
            <div class="navbar-right"></div>
        </div>

        <div class="page-content">
            <div id="authSuccess" class="card text-center py-8" style="display: none; background: linear-gradient(180deg, #F6FFED 0%, #FFFFFF 100%); border: 1px solid #B7EB8F;">
                <div style="width: 72px; height: 72px; background: var(--success-color); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 36px; box-shadow: 0 4px 12px rgba(82, 196, 26, 0.3);">✓</div>
                <h2 class="text-xl font-bold mb-8" style="color: #389e0d;">实名认证已通过</h2>
                <p class="text-secondary text-sm mb-24 px-4">您已完成实名认证，账号更安全。</p>
                <div class="flex flex-col" style="gap: 12px; padding: 0 16px;">
                    <button class="btn btn-secondary btn-block" onclick="history.back()">返回</button>
                </div>
            </div>

            <div id="authSubmitted" class="card text-center py-8" style="display: none; background: linear-gradient(180deg, #fffbe6 0%, #ffffff 100%); border: 1px solid #ffe58f;">
                <div style="width: 72px; height: 72px; background: #faad14; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; box-shadow: 0 4px 12px rgba(250, 173, 20, 0.28);">⌛</div>
                <h2 class="text-xl font-bold mb-8" style="color: #d48806;">审核中</h2>
                <p class="text-secondary text-sm mb-24 px-4">已提交实名认证信息，审核期间可修改补充。</p>
                <div class="flex flex-col" style="gap: 12px; padding: 0 16px;">
                    <button class="btn btn-outline btn-block" onclick="resetAuth()">撤销并重新填写</button>
                </div>
            </div>

            <div id="authFormArea">
                <!-- 优化后的标题区域 -->
                <div class="auth-title-section">
                    <div class="auth-description">请上传学生证或一卡通照片进行认证</div>
                </div>

                <div class="card">
                    <div class="form-group">
                        <label class="form-label">真实姓名</label>
                        <input id="authName" type="text" class="form-input" placeholder="请输入真实姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">学号</label>
                        <input id="authStudentId" type="text" class="form-input" placeholder="请输入学号">
                    </div>
                    <div class="form-group">
                        <label class="form-label">证件照片</label>
                        <div id="authUploadArea" class="upload-area">
                            <div class="upload-add" style="display: flex; flex-direction: column; align-items: center;">
                                <div class="upload-icon">📷</div>
                                <div class="upload-text">点击上传证件正面照</div>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary btn-block btn-lg" onclick="submitAuth()">提交认证</button>
                <button class="btn btn-outline btn-block mt-16" style="margin-top: 16px;" onclick="mockAuthApprove()">模拟后台通过（测试）</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let authUploader;

        document.addEventListener('DOMContentLoaded', () => {
            authUploader = new ImageUploader({
                container: '#authUploadArea',
                maxCount: 1,
                maxSizeMB: 8,
                previewSize: '100%'
            });
            checkAuthStatus();
        });

        function checkAuthStatus() {
            const auth = CommonUtils.getAuth() || {};
            hydrateFormFromAuth(auth);

            const successEl = document.getElementById('authSuccess');
            const submittedEl = document.getElementById('authSubmitted');
            const formEl = document.getElementById('authFormArea');

            if (auth.authStatus === 'approved') {
                successEl.style.display = 'block';
                submittedEl.style.display = 'none';
                formEl.style.display = 'none';
            } else {
                successEl.style.display = 'none';
                formEl.style.display = 'block';
                submittedEl.style.display = auth.authStatus === 'submitted' || auth.authStatus === 'pending' ? 'block' : 'none';
            }
        }

        function mockAuthApprove() {
            const auth = CommonUtils.getAuth() || {};
            CommonUtils.setAuth({
                ...auth,
                authStatus: 'approved'
            });
            CommonUtils.showToast('已模拟实名认证通过', 'success');
            checkAuthStatus();
        }

        function submitAuth() {
            const name = document.getElementById('authName').value.trim();
            const studentId = document.getElementById('authStudentId').value.trim();

            if (!name || !studentId) {
                CommonUtils.showToast('请填写姓名和学号', 'warning');
                return;
            }

            if (!authUploader || authUploader.getPreviews().length === 0) {
                CommonUtils.showToast('请上传证件照片', 'warning');
                return;
            }

            const docPreview = (authUploader && authUploader.getPreviews()[0]) || '';

            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.innerText = '提交中...';
            
            setTimeout(() => {
                // 持久化认证状态
                const auth = CommonUtils.getAuth() || {};
                const merged = {
                    ...auth,
                    loggedIn: true,
                    role: auth.role || 'publisher',
                    realName: name,
                    studentId,
                    authDoc: docPreview,
                    authStatus: 'submitted',
                    runnerStatus: auth.runnerStatus || 'pending',
                    firstLogin: false
                };
                CommonUtils.setAuth(merged);

                // 同步到 dataStore.currentUser，便于其他页面读取
                try {
                    if (window.dataStore) {
                        const current = dataStore.get('currentUser') || {};
                        dataStore.set('currentUser', {
                            ...current,
                            id: merged.id || current.id,
                            name: merged.name || merged.realName || current.name,
                            nickname: merged.nickname || current.nickname,
                            phone: merged.phone || current.phone,
                            role: merged.role,
                            creditScore: merged.creditScore || current.creditScore || 100,
                            authStatus: merged.authStatus,
                            realName: merged.realName,
                            studentId: merged.studentId
                        });
                    }
                } catch (e) {
                    console.warn('同步当前用户信息失败', e);
                }

                CommonUtils.showToast('提交成功，请等待审核', 'success');
                checkAuthStatus();
                btn.disabled = false;
                btn.innerText = '提交认证';
            }, 1200);
        }

        function resetAuth() {
            const auth = CommonUtils.getAuth() || {};
            const cleared = {
                ...auth,
                authStatus: null,
                realName: '',
                studentId: '',
                authDoc: ''
            };
            CommonUtils.setAuth(cleared);
            if (window.dataStore) {
                const current = dataStore.get('currentUser') || {};
                dataStore.set('currentUser', { ...current, authStatus: null, realName: '', studentId: '' });
            }
            CommonUtils.showToast('已撤销认证，可重新填写', 'info');
            checkAuthStatus();
        }

        function hydrateFormFromAuth(auth) {
            if (!auth) return;
            const nameEl = document.getElementById('authName');
            const sidEl = document.getElementById('authStudentId');
            if (nameEl && auth.realName) nameEl.value = auth.realName;
            if (sidEl && auth.studentId) sidEl.value = auth.studentId;

            if (auth.authDoc) {
                setAuthUploadPreview(auth.authDoc);
            }
        }

        function setAuthUploadPreview(dataUrl) {
            if (!authUploader || !dataUrl) return;
            authUploader.files = [{ file: null, preview: dataUrl }];
            authUploader.render();
        }
    </script>
</body>
</html>
