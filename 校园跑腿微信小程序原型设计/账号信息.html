<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>账号信息 - 校园跑腿</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/ui-components.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="navbar-left">
                <div class="navbar-back" onclick="history.back()">←</div>
            </div>
            <div class="navbar-title">账号信息</div>
            <div class="navbar-right"></div>
        </div>

        <div class="page-content">
            <div class="card">
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input id="profileName" type="text" class="form-input" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input id="profilePhone" type="tel" class="form-input" placeholder="请输入手机号">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">微信号</label>
                    <input id="profileWechat" type="text" class="form-input" placeholder="请输入微信号 (选填)">
                </div>
                <button class="btn btn-primary btn-block mt-24" onclick="saveProfile()">保存信息</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
        });

        function loadProfile() {
            try {
                const saved = JSON.parse(localStorage.getItem('profileInfo') || 'null');
                if (!saved) return;
                document.getElementById('profileName').value = saved.name || '';
                document.getElementById('profilePhone').value = saved.phone || '';
                document.getElementById('profileWechat').value = saved.wechat || '';
            } catch (e) {
                console.error(e);
            }
        }

        function saveProfile() {
            const name = document.getElementById('profileName').value.trim();
            const phone = document.getElementById('profilePhone').value.trim();
            const wechat = document.getElementById('profileWechat').value.trim();

            if (!name) {
                CommonUtils.showToast('请输入昵称', 'warning');
                return;
            }

            if (phone) {
                const check = FormValidator.validatePhone(phone);
                if (!check.valid) {
                    CommonUtils.showToast(check.message, 'warning');
                    return;
                }
            }

            const data = { name, phone, wechat };
            localStorage.setItem('profileInfo', JSON.stringify(data));

            // 同步到登录身份信息，便于其它功能读取
            const auth = CommonUtils.getAuth() || { loggedIn: true, role: 'publisher', firstLogin: false, runnerStatus: 'pending' };
            const merged = { ...auth, nickname: name, phone, wechat };
            CommonUtils.setAuth(merged);

            CommonUtils.showToast('保存成功', 'success');
            setTimeout(() => history.back(), 600);
        }
    </script>
</body>
</html>
