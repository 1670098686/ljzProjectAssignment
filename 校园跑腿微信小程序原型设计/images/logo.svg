<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
    <!-- 背景渐变 -->
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#36CFc9;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- 主背景 -->
    <rect width="80" height="80" rx="16" fill="url(#logoGradient)"/>
    
    <!-- 校园建筑轮廓 -->
    <path d="M25 35L30 30L50 30L55 35V55L40 65L25 55Z" fill="white" opacity="0.9"/>
    <path d="M30 30L30 35L50 35L50 30" fill="#1890FF"/>
    <path d="M35 35L35 45" stroke="#1890FF" stroke-width="2" stroke-linecap="round"/>
    <path d="M45 35L45 45" stroke="#1890FF" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 跑腿员图标 -->
    <circle cx="40" cy="40" r="8" fill="#1890FF"/>
    <path d="M40 48L40 58" stroke="#1890FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M35 53L40 48L45 53" stroke="#1890FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M35 58L40 63L45 58" stroke="#1890FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 包裹图标 -->
    <rect x="60" y="40" width="12" height="15" rx="2" fill="white"/>
    <rect x="63" y="42" width="6" height="3" fill="#1890FF"/>
    <path d="M60 45L72 45" stroke="#1890FF" stroke-width="1"/>
    <path d="M60 49L72 49" stroke="#1890FF" stroke-width="1"/>
    
    <!-- 动态效果线条 -->
    <path d="M45 40L55 38" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M48 35L58 33" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>