<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>绑定手机号 - 校园跑腿</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/ui-components.css">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="navbar">
            <div class="navbar-left">
                <div class="navbar-back" onclick="history.back()">←</div>
            </div>
            <div class="navbar-title">绑定手机号</div>
            <div class="navbar-right"></div>
        </div>

        <!-- 页面内容 -->
        <div class="page-content">
            <div class="text-center mb-32 mt-16">
                <p class="text-secondary">为了保障您的账户安全，请绑定手机号</p>
            </div>

            <div class="card">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" placeholder="请输入11位手机号" maxlength="11" id="phone">
                </div>
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="flex">
                        <input type="number" class="form-input" placeholder="请输入验证码" maxlength="6" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" id="code">
                        <button class="btn btn-secondary" style="border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; width: 120px;" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
                    </div>
                </div>
                <div class="mt-32">
                    <button class="btn btn-primary btn-block btn-lg" onclick="bindPhone()">绑定</button>
                </div>
            </div>

            <div class="text-center mt-16">
                <a href="#" class="text-sm text-secondary">使用其他手机号</a>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        function sendCode() {
            const phone = document.getElementById('phone').value;
            if (phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            let count = 60;
            btn.innerText = `${count}s`;
            const timer = setInterval(() => {
                count--;
                btn.innerText = `${count}s`;
                if (count <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '获取验证码';
                }
            }, 1000);
            // 模拟发送验证码
            document.getElementById('code').value = '123456';
        }

        function bindPhone() {
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;
            if (!phone || !code) {
                alert('请填写完整信息');
                return;
            }
            // 写入登录态并引导身份选择
            const auth = {
                id: `phone_${phone}`,
                openid: `phone_${phone}`,
                phone,
                loggedIn: true,
                role: null,
                runnerStatus: 'none',
                firstLogin: true,
                name: `用户${phone.slice(-4)}`
            };
            if (window.CommonUtils && CommonUtils.setAuth) {
                CommonUtils.setAuth(auth);
            } else {
                localStorage.setItem('authUser', JSON.stringify(auth));
            }
            location.href = '身份选择.html';
        }
    </script>
</body>
</html>
