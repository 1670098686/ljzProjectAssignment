apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-main-service
  namespace: finance-system
  labels:
    app: finance-main-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: finance-main-service
  template:
    metadata:
      labels:
        app: finance-main-service
    spec:
      containers:
      - name: main-service
        image: finance/main-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: SPRING_DATASOURCE_MASTER_URL
          value: "jdbc:mysql://mysql-master:3306/main_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
        - name: SPRING_DATASOURCE_MASTER_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: SPRING_DATASOURCE_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        - name: SPRING_REDIS_HOST
          value: "redis-service"
        - name: EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE
          value: "http://finance-registry:8761/eureka/"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: finance-main-service
  namespace: finance-system
spec:
  selector:
    app: finance-main-service
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
