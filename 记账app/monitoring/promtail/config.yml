# Promtail配置文件
# 用于收集应用程序日志

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Spring Boot应用日志
  - job_name: finance-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: finance-app
          __path__: /var/log/finance-app/*.log
    pipeline_stages:
      # JSON解析
      - json:
          expressions:
            timestamp: '@timestamp'
            level: level
            logger: logger_name
            message: message
            thread: thread_name
            trace_id:
            span_id:
      
      # 时间戳处理
      - timestamp:
          source: timestamp
          target: time
      
      # 标签处理
      - labels:
          level:
          logger:
          thread:
          trace_id:
          span_id:
      
      # 消息清理
      - output:
          source: message

  # 数据库慢查询日志
  - job_name: mysql-slow-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql-slow
          __path__: /var/log/mysql/mysql-slow.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>.*)Query_time: (?P<query_time>[0-9.]+)\s+Lock_time: (?P<lock_time>[0-9.]+)\s+Rows_sent: (?P<rows_sent>\d+)\s+Rows_examined: (?P<rows_examined>\d+).*'
      - labels:
          query_time:
          rows_sent:
          rows_examined:
      - timestamp:
          source: timestamp
          target: time

  # Nginx访问日志
  - job_name: nginx-access-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '(?P<remote_addr>[\d.]+)\s+-\s+-\s+\[(?P<time_local>[^\]]+)\]\s+"(?P<method>[A-Z]+)\s+(?P<request>[^"]*)\s+HTTP/(?P<http_version>[^"]+)"\s+(?P<status>\d+)\s+(?P<body_bytes_sent>\d+)\s+"(?P<http_referer>[^"]*)"\s+"(?P<http_user_agent>[^"]*)"'
      - labels:
          method:
          status:
          http_version:
      - timestamp:
          source: time_local
          target: time
          format: '02/Jan/2006:15:04:05 -0700'

  # 系统日志
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>[A-Za-z]{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>[\w.-]+)\s+(?P<service>[a-zA-Z0-9._-]+):\s+(?P<message>.*)'
      - labels:
          hostname:
          service:
      - timestamp:
          source: timestamp
          target: time
          format: 'Jan 02 15:04:05'

  # 容器日志 (Docker)
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_logging']
        regex: 'promtail'
        action: keep
      - source_labels: ['__meta_docker_container_log_path']
        target_label: '__path__'
    pipeline_stages:
      - json:
          expressions:
            output:
            stream:
      - labels:
          stream:
      - output:
          source: output

  # 监控服务日志
  - job_name: monitoring-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: prometheus
          __path__: /var/log/prometheus/*.log
      - targets:
          - localhost
        labels:
          job: grafana
          __path__: /var/log/grafana/*.log
      - targets:
          - localhost
        labels:
          job: alertmanager
          __path__: /var/log/alertmanager/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2}[T\s]\d{2}:\d{2}:\d{2}[.\d]*Z?)\s+(?P<level>INFO|WARN|ERROR|DEBUG)\s+(?P<message>.*)'
      - labels:
          level:
      - timestamp:
          source: timestamp
          target: time