# Grafana配置文件
# 数据源配置

apiVersion: 1

datasources:
  # Prometheus数据源
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
    version: 1
    
  # InfluxDB数据源 (可选，用于长期数据存储)
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: "monitoring"
    user: "admin"
    password: "admin123"
    editable: true
    jsonData:
      interval: "15s"
      timeInterval: "15s"
    version: 1

  # Jaeger数据源 (可选，用于链路追踪)
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: 'loki'
        tags: ['job', 'instance', 'pod', 'namespace']
        mappedTags: [
          {
            'key': 'service.name',
            'value': 'service'
          }
        ]
        mapTagNamesEnabled: false
        spanStartTimeShift: '1h'
        spanEndTimeShift: '1h'
        filterByTraceID: false
        filterBySpanID: false
    version: 1