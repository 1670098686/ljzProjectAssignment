# Alertmanager配置文件
# 告警管理和通知配置

global:
  # SMTP服务器配置
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'monitoring@finance-app.com'
  smtp_auth_username: 'monitoring@finance-app.com'
  smtp_auth_password: 'your-app-password'
  smtp_require_tls: true
  
  # Slack配置
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# 路由配置
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    # 关键告警立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 15m
      
    # 系统告警
    - match_re:
        service: ^(system|jvm|database)$
      receiver: 'system-alerts'
      
    # 业务告警
    - match_re:
        service: ^(business|security)$
      receiver: 'business-alerts'
      
    # 预警级别的告警发送到邮件
    - match:
        severity: warning
      receiver: 'warning-alerts'

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@finance-app.com'
        subject: '【{{ .GroupLabels.alertname }}】{{ .GroupLabels.instance }}告警通知'
        body: |
          {{ range .Alerts }}
          告警名称: {{ .Annotations.summary }}
          告警详情: {{ .Annotations.description }}
          告警级别: {{ .Labels.severity }}
          实例: {{ .Labels.instance }}
          时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        send_resolved: true

  # 严重告警接收器
  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@finance-app.com'
        subject: '【紧急】{{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'
        body: |
          🚨 严重告警 🚨
          
          {{ range .Alerts }}
          ⚠️ 告警名称: {{ .Annotations.summary }}
          📝 告警详情: {{ .Annotations.description }}
          🔥 实例: {{ .Labels.instance }}
          ⏰ 时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          
          {{ if .EndsAt.IsZero }}
          ⚡ 状态: 正在发生
          {{ else }}
          ✅ 状态: 已恢复 ({{ .EndsAt.Format "2006-01-02 15:04:05" }})
          {{ end }}
          {{ end }}
    slack_configs:
      - api_url: '${SLACK_API_URL}'
        channel: '#alerts'
        title: '🚨 严重告警: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *告警*: {{ .Annotations.summary }}
          *实例*: {{ .Labels.instance }}
          *详情*: {{ .Annotations.description }}
          *时间*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # 系统告警接收器
  - name: 'system-alerts'
    email_configs:
      - to: 'devops@finance-app.com'
        subject: '【系统告警】{{ .GroupLabels.alertname }}'
        body: |
          🖥️ 系统告警通知
          
          {{ range .Alerts }}
          📊 告警名称: {{ .Annotations.summary }}
          💻 实例: {{ .Labels.instance }}
          📋 描述: {{ .Annotations.description }}
          ⏰ 时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          
          建议操作:
          - 检查服务器资源使用情况
          - 验证应用程序状态
          - 查看相关日志文件
          {{ end }}
    webhook_configs:
      - url: 'http://webhook-server:8080/webhook/alert'
        send_resolved: true

  # 业务告警接收器
  - name: 'business-alerts'
    email_configs:
      - to: 'business@finance-app.com'
        subject: '【业务监控】{{ .GroupLabels.alertname }}'
        body: |
          💼 业务监控告警
          
          {{ range .Alerts }}
          📈 告警名称: {{ .Annotations.summary }}
          🏢 业务模块: {{ .Labels.service }}
          📋 描述: {{ .Annotations.description }}
          👤 用户影响: 请检查相关用户数据
          ⏰ 时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          
          建议操作:
          - 检查用户反馈
          - 验证业务逻辑
          - 联系技术支持团队
          {{ end }}

  # 警告级别接收器
  - name: 'warning-alerts'
    email_configs:
      - to: 'team@finance-app.com'
        subject: '【预警】{{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'
        body: |
          ⚠️ 预警通知
          
          {{ range .Alerts }}
          📢 预警名称: {{ .Annotations.summary }}
          🔍 详情: {{ .Annotations.description }}
          🖥️ 实例: {{ .Labels.instance }}
          ⏰ 时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          
          这是一个预警级别的告警，建议关注但无需立即处理。
          {{ end }}

# 抑制规则
inhibit_rules:
  # 如果有严重的应用宕机告警，抑制其他告警
  - source_match:
      alertname: 'ApplicationDown'
    target_match:
      alertname: 'HighResponseTime'
    equal: ['instance']
    
  # 如果系统资源不可用，抑制其他系统告警
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      service: '^(system|jvm)$'
    equal: ['instance']

# 模板配置
templates:
  - '/etc/alertmanager/templates/*.tmpl'